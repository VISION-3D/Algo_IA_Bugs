<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartes de Prix Réutilisables</title>
  <style>
    /* Conteneur des cartes : flex pour aligner les cartes horizontalement */
    .pricing-container {
      display: flex;
      justify-content: center;
      gap: 15px; /*  réduit l’espace entre les cartes (au lieu de 20px) */
      margin: 20px;
      flex-wrap: wrap; /* Permet de passer en ligne suivante si l’écran est petit */
    }

    /* Style général d'une carte de prix */
    .pricing-card {
      width: 300px;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc;
      padding: 20px;
      text-align: left;
      border-radius: 8px;
      transition: transform 0.2s;
    }

    /* Effet hover pour donner du relief */
    .pricing-card:hover {
      transform: scale(1.03);
    }

    /* Titre du plan */
    .pricing-card .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* Prix du plan */
    .pricing-card .price {
      font-size: 18px;
      color: green;
      margin-bottom: 15px;
    }

    /* Liste des fonctionnalités */
    .pricing-card .features {
      list-style: none;
      padding-left: 0;
      margin-bottom: 15px;
    }

    .pricing-card .features li {
      padding: 4px;
      border-bottom: 1px solid #eee;
    }

    /* Bouton d'action */
    .pricing-card .btn {
      background: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    /* Effet hover sur bouton */
    .pricing-card .btn:hover {
      background: darkblue;
    }
  </style>
</head>
<body>

  <div class="pricing-container">
    <!-- Première carte -->
    <div class="pricing-card">
      <h2 class="title">Forfait de base</h2>
      <p class="price">9,99 $/mois</p>
      <ul class="features">
        <li>1 Go de stockage</li>
        <li>Assistance de base</li>
        <li>Toutes les fonctionnalités principales</li>
      </ul>
      <button class="btn">Démarrer l'essai</button>
    </div>

    <!-- Deuxième carte -->
    <div class="pricing-card">
      <h2 class="title">Forfait Premium</h2>
      <p class="price">19,99 $/mois</p>
      <ul class="features">
        <li>10 Go de stockage</li>
        <li>Assistance prioritaire</li>
        <li>Accès complet</li>
      </ul>
      <button class="btn">Choisir</button>
    </div>
  </div>

</body>
</html>
