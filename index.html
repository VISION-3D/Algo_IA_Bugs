<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tarification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
    <meta name="description" content="Cartes de tarification avec design moderne et code réutilisable." />
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1 class="page-title">Nos forfaits</h1>
            <p class="page-subtitle">Choisissez le plan qui vous convient.</p>
        </header>

        <section class="pricing-grid" id="pricingGrid" aria-label="Options de tarification">
            <noscript>
                <article class="pricing-card">
                    <h2 class="title">Forfait de base</h2>
                    <p class="price"><span class="amount">9,99&nbsp;$</span><span class="period">/mois</span></p>
                    <ul class="features">
                        <li>1 Go de stockage</li>
                        <li>Assistance de base</li>
                        <li>Toutes les fonctionnalités principales</li>
                    </ul>
                    <button class="btn" type="button">Démarrer l'essai</button>
                </article>
            </noscript>
        </section>
    </main>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
<style>
.pricing {
width: 300px;
margin: auto;
background-color: #fff;
box-shdow: 0 0 10px #ccc;
padding: 10px;
text-align: left;
}

.title {
font-size: 22px;
font-weight: bold;
}

.price {
font-size: 18px;
color: green;
}

.features {
list-style: none;
padding-left: 0;
}

.features li {
padding: 4px;
border-bottom: 1px solid #eee;
}

.btn {
background: blue;
color: white;
padding: 10px 20px;
border: none;
margin-top: 10px;
}

.btn:hover {
background: darkblue;
}
</style>
</head>
<body>

<div class="pricing">
<h2 class="title">Forfait de base<h2>
<p class="price">9,99 $/mois</p>

<ul class="features">
<li>1 Go de stockage</li>
<li>Assistance de base</li>
<li>Toutes les fonctionnalités principales</li>
</ul>

<button class="btn">Démarrer l'essai</button>
</div>

</body>
</html>
